<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Tweet Storm</title>
    <meta name="description" content="Generate engaging Twitter threads instantly with AI.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-xl max-w-md w-full">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-4">Tweet Storm Generator</h1>
        <p class="text-center text-gray-600 mb-6">Craft engaging Twitter threads instantly with AI.</p>
        
        <form id="tweetForm" class="space-y-4">
            <textarea id="ideaInput" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" rows="4" placeholder="What's your big idea or topic?" required></textarea>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
                Generate Storm
            </button>
        </form>

        <div id="results" class="mt-6 space-y-4 hidden">
            <h2 class="text-xl font-semibold text-gray-700">Your Tweet Storm:</h2>
            <div id="tweetOutput" class="bg-gray-100 p-4 rounded-md text-gray-800 whitespace-pre-wrap"></div>
            <button onclick="copyTweets()" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition duration-200 mt-2">
                Copy Tweets
            </button>
        </div>

        <p class="text-center text-gray-500 text-sm mt-8">
            Free generations available. <a href="#" class="text-blue-600 hover:underline">Upgrade for more!</a>
        </p>
    </div>

    <script>
        document.getElementById('tweetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const idea = document.getElementById('ideaInput').value;
            const generateBtn = e.target.querySelector('button');
            generateBtn.textContent = 'Generating...';
            generateBtn.disabled = true;

            // In a real app, this would be an API call to your backend
            // const response = await fetch('/api/generate-tweet-storm', { method: 'POST', body: JSON.stringify({ idea }), headers: { 'Content-Type': 'application/json' } });
            // const data = await response.json();
            
            // Mock data for demonstration
            const mockTweets = `1/ We're launching AI Tweet Storm!

It helps content creators, marketers, & entrepreneurs generate engaging Twitter threads from a single idea quickly 🚀

#AI #SaaS #Twitter

2/ Ever struggled to turn a thought into a full thread? This tool is for you.

Input your topic, and our AI crafts a cohesive, tweet-by-tweet storm designed for maximum engagement.

Save time, grow your audience. 👇

3/ Get a few free generations to start. 

Like what you see? Unlock unlimited potential with our affordable pricing plan.

Revolutionize your Twitter strategy today! ✨

4/ Try AI Tweet Storm now and elevate your Twitter game! [Link to your app]`;

            document.getElementById('tweetOutput').textContent = mockTweets;
            document.getElementById('results').classList.remove('hidden');

            generateBtn.textContent = 'Generate Storm';
            generateBtn.disabled = false;
        });

        function copyTweets() {
            const tweetOutput = document.getElementById('tweetOutput');
            navigator.clipboard.writeText(tweetOutput.textContent)
                .then(() => alert('Tweets copied to clipboard!'))
                .catch(err => console.error('Failed to copy text: ', err));
        }
    </script>
</body>
</html>
