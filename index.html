<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tweet Storm</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 768px; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="container bg-white shadow-lg rounded-lg p-8 space-y-6">
        <h1 class="text-4xl font-bold text-center text-gray-800">AI Tweet Storm</h1>
        <p class="text-center text-gray-600">Turn your idea into an engaging Twitter thread instantly.</p>
        
        <textarea id="ideaInput" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" rows="6" placeholder="Enter your core idea for a tweet storm..."></textarea>
        
        <button id="generateButton" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-md hover:bg-blue-700 transition duration-300">
            Generate Tweet Storm ($9.99)
        </button>

        <div id="outputSection" class="hidden mt-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Your Tweet Storm:</h2>
            <div id="tweetOutput" class="bg-gray-50 p-4 border border-gray-200 rounded-md whitespace-pre-wrap"></div>
            <div class="mt-4 flex space-x-4">
                <button id="copyButton" class="flex-1 bg-green-500 text-white font-semibold py-2 rounded-md hover:bg-green-600 transition duration-300">Copy to Clipboard</button>
                <a id="tweetNowLink" href="#" target="_blank" class="flex-1 text-center bg-blue-400 text-white font-semibold py-2 rounded-md hover:bg-blue-500 transition duration-300">Tweet Now</a>
            </div>
        </div>

        <div id="loadingSpinner" class="hidden text-center mt-4">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-900 mx-auto"></div>
            <p class="mt-2 text-gray-500">Generating...</p>
        </div>

        <p class="text-center text-sm text-gray-500 mt-6">Secured by Stripe for payments.</p>
    </div>
    <script>
      // Placeholder for frontend logic. Actual logic would involve API calls to a backend.
      document.getElementById('generateButton').addEventListener('click', async () => {
          const idea = document.getElementById('ideaInput').value;
          if (!idea) { alert('Please enter an idea!'); return; }

          document.getElementById('generateButton').classList.add('hidden');
          document.getElementById('loadingSpinner').classList.remove('hidden');
          document.getElementById('outputSection').classList.add('hidden');

          // Simulate API call and Stripe checkout
          // In a real app, this would initiate a Stripe checkout session
          // and then on success, call your backend to generate the storm.
          await new Promise(resolve => setTimeout(resolve, 2000)); 
          const dummyStorm = "1/ We all struggle with content creation. 😩\n\n2/ Imagine turning a single idea into a full, engaging *tweet storm* in seconds. That's what AI Tweet Storm does! 🚀\n\n3/ No more writer's block, no more endless drafting. Just coherent, attention-grabbing threads. ✨\n\n4/ What's your biggest content challenge? Let us know below! 👇 #AItools #TweetStorm #ContentCreator";
          
          document.getElementById('tweetOutput').textContent = dummyStorm;
          document.getElementById('tweetNowLink').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(dummyStorm)}`;

          document.getElementById('loadingSpinner').classList.add('hidden');
          document.getElementById('outputSection').classList.remove('hidden');
          document.getElementById('generateButton').classList.remove('hidden');
      });

      document.getElementById('copyButton').addEventListener('click', () => {
          const output = document.getElementById('tweetOutput').textContent;
          navigator.clipboard.writeText(output).then(() => {
              alert('Tweet storm copied to clipboard!');
          }).catch(err => {
              console.error('Failed to copy: ', err);
          });
      });
    </script>
</body>
</html>
